<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TutorHive Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
    <script src="mock-api.js" defer></script>
    <script src="admin.js" defer></script>
  </head>
  <body>
    <header>
      <div class="container header-wrap">
        <div>
          <p class="eyebrow">TutorHive</p>
          <h1>Lead Operations Console</h1>
        </div>
        <div class="actions">
          <span id="runtimeBadge" class="runtime-badge">Checking runtime...</span>
          <button id="refreshButton">Refresh Data</button>
          <a href="/">Back to site</a>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="stats" id="overviewStats"></section>

      <section class="layout">
        <article class="panel">
          <h2>Pipeline Snapshot</h2>
          <div id="pipelineList" class="pipeline-list"></div>
        </article>
        <article class="panel">
          <h2>Recent Activity</h2>
          <div id="activityList" class="activity-list"></div>
        </article>
      </section>

      <section class="panel">
        <h2>Leads</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Lead ID</th>
                <th>Student</th>
                <th>Subject</th>
                <th>Score</th>
                <th>Priority</th>
                <th>Status</th>
                <th>Assigned Tutor</th>
              </tr>
            </thead>
            <tbody id="leadRows"></tbody>
          </table>
        </div>
        <p id="leadStatus" class="status"></p>
      </section>
    </main>
  </body>
</html>
